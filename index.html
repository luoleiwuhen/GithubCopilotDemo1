<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Todo App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --primary-dark: #5a52d5;
            --primary-light: #ede9ff;
            --danger: #ff5c7c;
            --danger-dark: #e0486a;
            --success: #22c55e;
            --bg-gradient-start: #6c63ff;
            --bg-gradient-end: #a855f7;
            --surface: #ffffff;
            --surface-2: #f5f3ff;
            --surface-3: #ede9ff;
            --text-primary: #1e1b4b;
            --text-secondary: #6b7280;
            --text-muted: #a0aec0;
            --border: #e5e7eb;
            --shadow: 0 20px 60px rgba(108, 99, 255, 0.25);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark {
            --primary: #818cf8;
            --primary-dark: #6d75f0;
            --primary-light: #1e1b4b;
            --bg-gradient-start: #0f0e17;
            --bg-gradient-end: #1a1040;
            --surface: #1a1832;
            --surface-2: #221f3d;
            --surface-3: #2d2a4a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #2d2a4a;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            transition: background var(--transition);
        }

        /* Animated background blobs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            animation: floatBlob 8s ease-in-out infinite alternate;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #a855f7, transparent);
            top: -100px;
            left: -100px;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #6c63ff, transparent);
            bottom: -80px;
            right: -80px;
            animation-delay: -4s;
        }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.1); }
        }

        .container {
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 540px;
            padding: 36px 32px;
            position: relative;
            transition: background var(--transition), box-shadow var(--transition);
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        h1 {
            color: var(--text-primary);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            transition: color var(--transition);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            transition: color var(--transition);
        }

        /* Theme toggle */
        .theme-toggle {
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            border-radius: 50px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .theme-toggle:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }

        /* Progress bar */
        .progress-section {
            margin-bottom: 24px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-count {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
        }

        .progress-bar-track {
            height: 6px;
            background: var(--surface-3);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a855f7);
            border-radius: 99px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        /* Input area */
        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        #todoInput {
            flex: 1;
            padding: 13px 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            background: var(--surface-2);
            color: var(--text-primary);
            transition: all var(--transition);
        }

        #todoInput::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        #todoInput:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.12);
        }

        #addBtn {
            padding: 13px 22px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.2px;
        }

        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 99, 255, 0.4);
        }

        #addBtn:active {
            transform: translateY(0) scale(0.97);
            box-shadow: none;
        }

        /* Filter tabs */
        .filter-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
            background: var(--surface-2);
            border-radius: var(--radius-md);
            padding: 5px;
        }

        .filter-tab {
            flex: 1;
            padding: 7px 10px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            background: transparent;
            transition: all var(--transition);
        }

        .filter-tab.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .filter-tab:hover:not(.active) {
            color: var(--text-primary);
        }

        /* Todo list */
        #todoList {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-item {
            background: var(--surface-2);
            padding: 14px 16px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1.5px solid transparent;
            transition: all var(--transition);
            animation: itemEnter 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        @keyframes itemEnter {
            from { opacity: 0; transform: translateY(-10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .todo-item.removing {
            animation: itemExit 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes itemExit {
            to { opacity: 0; transform: translateX(20px) scale(0.96); max-height: 0; padding: 0; margin: 0; }
        }

        .todo-item:hover {
            border-color: var(--primary);
            background: var(--surface-3);
            transform: translateX(3px);
            box-shadow: 0 4px 16px rgba(108, 99, 255, 0.1);
        }

        .todo-item.completed {
            opacity: 0.7;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Checkbox */
        .todo-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            flex-shrink: 0;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            appearance: none;
            -webkit-appearance: none;
        }

        .todo-checkbox:checked {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-color: var(--primary);
        }

        .todo-checkbox:checked::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: 700;
        }

        .todo-checkbox:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
        }

        .todo-text {
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            flex: 1;
            word-break: break-word;
            transition: all var(--transition);
            line-height: 1.4;
        }

        .delete-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 6px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            transition: all var(--transition);
            flex-shrink: 0;
            opacity: 0;
        }

        .todo-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: rgba(255, 92, 124, 0.12);
            color: var(--danger);
            transform: scale(1.15);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .empty-state .empty-icon {
            font-size: 52px;
            margin-bottom: 14px;
            display: block;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
        }

        .empty-state .empty-hint {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 6px;
            opacity: 0.7;
        }

        /* Footer actions */
        .footer-actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }

        .clear-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: var(--radius-sm);
            transition: all var(--transition);
        }

        .clear-btn:hover {
            color: var(--danger);
            background: rgba(255, 92, 124, 0.08);
        }

        .clear-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .clear-btn:disabled:hover {
            color: var(--text-muted);
            background: transparent;
        }

        /* Validation shake */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .shake {
            animation: shake 0.4s ease;
            border-color: var(--danger) !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-left">
                <h1>My Todos</h1>
                <span class="subtitle" id="subtitleText">Let's get things done ✨</span>
            </div>
            <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
        </header>

        <div class="progress-section" id="progressSection" style="display:none">
            <div class="progress-header">
                <span class="progress-label">Progress</span>
                <span class="progress-count" id="progressCount">0 / 0 done</span>
            </div>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="input-container">
            <input
                type="text"
                id="todoInput"
                placeholder="What needs to be done?"
                maxlength="200"
            >
            <button id="addBtn">+ Add</button>
        </div>

        <div class="filter-tabs" id="filterTabs" style="display:none">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="active">Active</button>
            <button class="filter-tab" data-filter="completed">Done</button>
        </div>

        <ul id="todoList"></ul>

        <div class="footer-actions">
            <button class="clear-btn" id="clearCompleted" disabled>Clear completed</button>
        </div>
    </div>

    <script>
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');
        const themeToggle = document.getElementById('themeToggle');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressCount = document.getElementById('progressCount');
        const filterTabs = document.getElementById('filterTabs');
        const clearCompletedBtn = document.getElementById('clearCompleted');
        const subtitleText = document.getElementById('subtitleText');

        let currentFilter = 'all';

        // Load and apply saved theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            themeToggle.textContent = '☀️ Light';
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            themeToggle.textContent = isDark ? '☀️ Light' : '🌙 Dark';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Load todos from localStorage
        let todos = JSON.parse(localStorage.getItem('todos')) || [];

        // Render todos on page load
        renderTodos();

        // Add todo on button click
        addBtn.addEventListener('click', addTodo);

        // Add todo on Enter key press
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        // Filter tabs
        filterTabs.addEventListener('click', (e) => {
            const tab = e.target.closest('.filter-tab');
            if (!tab) return;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFilter = tab.dataset.filter;
            renderTodos();
        });

        // Clear completed
        clearCompletedBtn.addEventListener('click', () => {
            todos = todos.filter(t => !t.completed);
            saveTodos();
            renderTodos();
        });

        function addTodo() {
            const todoText = todoInput.value.trim();

            if (todoText === '') {
                todoInput.classList.add('shake');
                todoInput.addEventListener('animationend', () => todoInput.classList.remove('shake'), { once: true });
                todoInput.focus();
                return;
            }

            todos.unshift({
                id: Date.now(),
                text: todoText,
                completed: false
            });

            saveTodos();
            todoInput.value = '';
            todoInput.focus();
            renderTodos();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
            }
        }

        function deleteTodo(id) {
            const item = document.querySelector(`[data-id="${id}"]`);
            if (item) {
                item.classList.add('removing');
                item.addEventListener('animationend', () => {
                    todos = todos.filter(todo => todo.id !== id);
                    saveTodos();
                    renderTodos();
                }, { once: true });
            }
        }

        function renderTodos() {
            todoList.innerHTML = '';

            const completedCount = todos.filter(t => t.completed).length;
            const total = todos.length;

            // Update progress
            if (total > 0) {
                progressSection.style.display = 'block';
                filterTabs.style.display = 'flex';
                const pct = Math.round((completedCount / total) * 100);
                progressFill.style.width = pct + '%';
                progressCount.textContent = `${completedCount} / ${total} done`;
                const remaining = total - completedCount;
                subtitleText.textContent = remaining === 0
                    ? 'All done! Great work 🎉'
                    : `${remaining} task${remaining !== 1 ? 's' : ''} remaining`;
            } else {
                progressSection.style.display = 'none';
                filterTabs.style.display = 'none';
                subtitleText.textContent = "Let's get things done ✨";
            }

            // Update clear button
            clearCompletedBtn.disabled = completedCount === 0;

            // Filter todos
            const filtered = todos.filter(todo => {
                if (currentFilter === 'active') return !todo.completed;
                if (currentFilter === 'completed') return todo.completed;
                return true;
            });

            if (filtered.length === 0) {
                const li = document.createElement('li');
                const emptyIcon = todos.length === 0 ? '📋' : currentFilter === 'completed' ? '😊' : '✅';
                const emptyTitle = todos.length === 0 ? 'No todos yet!' : currentFilter === 'completed' ? 'Nothing completed yet' : 'All done!';
                const emptyHint = todos.length === 0 ? 'Add your first task above to get started.' : '';
                li.innerHTML = `
                    <div class="empty-state">
                        <span class="empty-icon">${emptyIcon}</span>
                        <p>${emptyTitle}</p>
                        <p class="empty-hint">${emptyHint}</p>
                    </div>
                `;
                todoList.appendChild(li);
                return;
            }

            filtered.forEach(todo => {
                const li = document.createElement('li');
                li.className = 'todo-item' + (todo.completed ? ' completed' : '');
                li.dataset.id = todo.id;
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'todo-checkbox';
                checkbox.checked = todo.completed;
                checkbox.setAttribute('aria-label', 'Complete todo');
                checkbox.addEventListener('change', () => toggleTodo(todo.id));
                const textSpan = document.createElement('span');
                textSpan.className = 'todo-text';
                textSpan.textContent = todo.text;
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.setAttribute('aria-label', 'Delete todo');
                deleteBtn.textContent = '✕';
                deleteBtn.addEventListener('click', () => deleteTodo(todo.id));
                li.append(checkbox, textSpan, deleteBtn);
                todoList.appendChild(li);
            });
        }

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }
    </script>
</body>
</html>
