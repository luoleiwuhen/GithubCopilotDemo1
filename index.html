<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项应用</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="themeToggle" class="theme-toggle" aria-label="切换主题">🌙</button>

    <div class="container">
        <header class="app-header">
            <h1>我的待办事项</h1>
            <div class="stats">
                <span id="totalCount" class="stat-badge">0 项</span>
                <span id="completedCount" class="stat-badge stat-badge--done">0 完成</span>
            </div>
        </header>

        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="input-container">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="添加新任务，按 Enter 确认…"
                autocomplete="off"
            >
            <button id="addBtn" class="add-btn" aria-label="添加待办事项">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                添加
            </button>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="active">未完成</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
        </div>

        <ul id="todoList" class="todo-list">
            <!-- 待办事项将动态插入到这里 -->
        </ul>

        <div class="empty-state hidden" id="emptyState">
            <div class="empty-icon">📋</div>
            <p class="empty-title">暂无待办事项</p>
            <p class="empty-subtitle">点击上方添加你的第一个任务吧！</p>
        </div>
    </div>

    <div class="watermark">王振邦开发专用</div>
    <div id="starContainer" class="star-container" aria-hidden="true"></div>

    <script src="script.js"></script>
</body>
</html>
