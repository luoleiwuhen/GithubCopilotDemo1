<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待办事项</title>
  <style>
    /* ── CSS custom properties for theming ── */
    :root {
      --bg: #f0f2f5;
      --container-bg: #ffffff;
      --shadow: rgba(0, 0, 0, 0.1);
      --heading: #1a1a2e;
      --item-bg: #f8f9fb;
      --item-hover: #eef0f8;
      --text: #333;
      --text-done: #aaa;
      --input-border: #dde1e7;
      --hint: #bbb;
      --toggle-bg: #e2e8ff;
      --toggle-color: #4f6ef7;
    }

    [data-theme="dark"] {
      --bg: #0f1117;
      --container-bg: #1c1f2e;
      --shadow: rgba(0, 0, 0, 0.5);
      --heading: #e8eaf6;
      --item-bg: #252840;
      --item-hover: #2e3254;
      --text: #d0d3e8;
      --text-done: #555;
      --input-border: #3a3f5c;
      --hint: #555;
      --toggle-bg: #2e3254;
      --toggle-color: #a5b4fc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      padding: 60px 16px;
      min-height: 100vh;
      transition: background 0.3s;
    }

    .container {
      background: var(--container-bg);
      border-radius: 12px;
      box-shadow: 0 4px 20px var(--shadow);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      position: relative;
    }

    h1 {
      font-size: 1.8rem;
      color: var(--heading);
    }

    /* ── Theme toggle button ── */
    #theme-toggle {
      position: absolute;
      right: 0;
      background: var(--toggle-bg);
      border: none;
      border-radius: 20px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--toggle-color);
      transition: background 0.3s, color 0.3s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #theme-toggle:hover {
      filter: brightness(0.9);
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--input-border);
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      background: var(--container-bg);
      color: var(--text);
      transition: border-color 0.2s, background 0.3s, color 0.3s;
    }

    .input-row input:focus {
      border-color: #4f6ef7;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #3a56d4;
    }

    #todo-list {
      list-style: none;
    }

    #todo-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--item-bg);
      border-radius: 8px;
      margin-bottom: 10px;
      transition: background 0.15s;
    }

    #todo-list li:hover {
      background: var(--item-hover);
    }

    #todo-list li.done .todo-text {
      text-decoration: line-through;
      color: var(--text-done);
    }

    #todo-list li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4f6ef7;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 1rem;
      color: var(--text);
      word-break: break-word;
      transition: color 0.3s;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #c0392b;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: #fde8e8;
    }

    .empty-hint {
      text-align: center;
      color: var(--hint);
      font-size: 0.95rem;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📝 待办事项</h1>
      <button id="theme-toggle" title="切换主题">🌙 深色</button>
    </div>
    <div class="input-row">
      <input
        type="text"
        id="todo-input"
        placeholder="输入待办事项…"
        maxlength="100"
        autocomplete="off"
      />
      <button id="add-btn">添加</button>
    </div>
    <ul id="todo-list"></ul>
    <p class="empty-hint" id="empty-hint">暂无待办事项，快来添加吧！</p>
  </div>

  <script>
    // ── Theme toggle ──
    const themeToggle = document.getElementById("theme-toggle");
    const THEME_KEY = "todo-theme";

    function applyTheme(dark) {
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      themeToggle.textContent = dark ? "☀️ 浅色" : "🌙 深色";
      localStorage.setItem(THEME_KEY, dark ? "dark" : "light");
    }

    // Load saved preference; fall back to OS preference
    const saved = localStorage.getItem(THEME_KEY);
    const prefersDark = saved
      ? saved === "dark"
      : window.matchMedia("(prefers-color-scheme: dark)").matches;
    applyTheme(prefersDark);

    themeToggle.addEventListener("click", () => {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      applyTheme(!isDark);
    });

    // ── To-do list ──
    const input = document.getElementById("todo-input");
    const addBtn = document.getElementById("add-btn");
    const list = document.getElementById("todo-list");
    const emptyHint = document.getElementById("empty-hint");

    function updateHint() {
      emptyHint.style.display = list.children.length === 0 ? "block" : "none";
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) {
        input.focus();
        return;
      }

      const li = document.createElement("li");

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.addEventListener("change", () => {
        li.classList.toggle("done", checkbox.checked);
      });

      const span = document.createElement("span");
      span.className = "todo-text";
      span.textContent = text;

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.title = "删除";
      deleteBtn.innerHTML = "&#128465;";
      deleteBtn.addEventListener("click", () => {
        li.remove();
        updateHint();
      });

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(deleteBtn);
      list.appendChild(li);

      input.value = "";
      input.focus();
      updateHint();
    }

    addBtn.addEventListener("click", addTodo);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTodo();
    });

    updateHint();
  </script>
</body>
</html>
