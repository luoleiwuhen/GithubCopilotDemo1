<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待办事项</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 60px 16px;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #dde1e7;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f6ef7;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #3a56d4;
    }

    #todo-list {
      list-style: none;
    }

    #todo-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: #f8f9fb;
      border-radius: 8px;
      margin-bottom: 10px;
      transition: background 0.15s;
    }

    #todo-list li:hover {
      background: #eef0f8;
    }

    #todo-list li.done .todo-text {
      text-decoration: line-through;
      color: #aaa;
    }

    #todo-list li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4f6ef7;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 1rem;
      color: #333;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #c0392b;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: #fde8e8;
    }

    .empty-hint {
      text-align: center;
      color: #bbb;
      font-size: 0.95rem;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 待办事项</h1>
    <div class="input-row">
      <input
        type="text"
        id="todo-input"
        placeholder="输入待办事项…"
        maxlength="100"
        autocomplete="off"
      />
      <button id="add-btn">添加</button>
    </div>
    <ul id="todo-list"></ul>
    <p class="empty-hint" id="empty-hint">暂无待办事项，快来添加吧！</p>
  </div>

  <script>
    const input = document.getElementById("todo-input");
    const addBtn = document.getElementById("add-btn");
    const list = document.getElementById("todo-list");
    const emptyHint = document.getElementById("empty-hint");

    function updateHint() {
      emptyHint.style.display = list.children.length === 0 ? "block" : "none";
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) {
        input.focus();
        return;
      }

      const li = document.createElement("li");

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.addEventListener("change", () => {
        li.classList.toggle("done", checkbox.checked);
      });

      const span = document.createElement("span");
      span.className = "todo-text";
      span.textContent = text;

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.title = "删除";
      deleteBtn.innerHTML = "&#128465;";
      deleteBtn.addEventListener("click", () => {
        li.remove();
        updateHint();
      });

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(deleteBtn);
      list.appendChild(li);

      input.value = "";
      input.focus();
      updateHint();
    }

    addBtn.addEventListener("click", addTodo);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTodo();
    });

    updateHint();
  </script>
</body>
</html>
